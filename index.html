<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sunday Sauce &mdash; Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-brand">
      <h1 class="brand-wordmark">Sunday Sauce</h1>
      <p class="brand-tagline">Admin Dashboard</p>
    </div>

    <div id="login-form" class="login-card">
      <p class="login-instruction">Sign in with your admin account.</p>
      <input type="email" id="email-input" placeholder="Email" autocomplete="email" />
      <input type="password" id="password-input" placeholder="Password" autocomplete="current-password" style="margin-bottom:12px" />
      <button id="login-btn" onclick="signIn()">Sign in</button>
    </div>

    <div id="login-error" class="login-card" style="display:none;">
      <p class="login-error-msg" id="error-msg"></p>
      <button onclick="location.reload()">Try again</button>
    </div>

    <div id="access-denied" class="login-card" style="display:none;">
      <p class="login-error-msg">Access denied. This dashboard is for admins only.</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="auth.js"></script>
  <script>
    (async () => {
      const ok = await checkSession();
      if (ok) window.location.href = 'dashboard.html';
    })();

    async function signIn() {
      const email = document.getElementById('email-input').value.trim();
      const password = document.getElementById('password-input').value;
      if (!email || !password) return;
      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      try {
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
        if (data.user.id !== ADMIN_USER_ID) {
          await sb.auth.signOut();
          document.getElementById('login-form').style.display = 'none';
          document.getElementById('access-denied').style.display = 'block';
          return;
        }
        window.location.href = 'dashboard.html';
      } catch (e) {
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('error-msg').textContent = e.message || 'Sign in failed.';
        document.getElementById('login-error').style.display = 'block';
      }
    }

    document.getElementById('password-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') signIn();
    });
  </script>
</body>
</html>
