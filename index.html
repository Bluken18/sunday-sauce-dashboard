<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sunday Sauce &mdash; Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-brand">
      <h1 class="brand-wordmark">Sunday Sauce</h1>
      <p class="brand-tagline">Admin Dashboard</p>
    </div>

    <div id="login-form" class="login-card">
      <p class="login-instruction">Sign in with your admin email to continue.</p>
      <input type="email" id="email-input" placeholder="you@example.com" autocomplete="email" />
      <button id="send-link-btn" onclick="sendMagicLink()">Send login link</button>
    </div>

    <div id="login-success" class="login-card" style="display:none;">
      <p class="login-success-msg">Check your email for the login link.</p>
      <p class="login-sub">You can close this tab &mdash; the link will bring you back.</p>
    </div>

    <div id="login-error" class="login-card" style="display:none;">
      <p class="login-error-msg" id="error-msg"></p>
      <button onclick="location.reload()">Try again</button>
    </div>

    <div id="access-denied" class="login-card" style="display:none;">
      <p class="login-error-msg">Access denied. This dashboard is for admins only.</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="auth.js"></script>
  <script>
    // On load: if already authenticated, redirect to dashboard
    (async () => {
      const ok = await checkSession();
      if (ok) {
        window.location.href = 'dashboard.html';
      }
    })();

    async function sendMagicLink() {
      const email = document.getElementById('email-input').value.trim();
      if (!email) return;
      const btn = document.getElementById('send-link-btn');
      btn.disabled = true;
      btn.textContent = 'Sending...';
      try {
        const { error } = await supabase.auth.signInWithOtp({
          email,
          options: { emailRedirectTo: window.location.origin + '/dashboard.html' }
        });
        if (error) throw error;
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('login-success').style.display = 'block';
      } catch (e) {
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('error-msg').textContent = e.message || 'Failed to send link.';
        document.getElementById('login-error').style.display = 'block';
      }
    }

    document.getElementById('email-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMagicLink();
    });
  </script>
</body>
</html>
